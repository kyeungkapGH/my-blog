baseurl: "/blog/"  # please update this to your actual URL
locale: "en-us"
title: "Cojimo.zip"
theme: "hugo-xmin"
googleAnalytics: ""
disqusShortname: ""
ignoreFiles: ["\\.Rmd$", "\\.Rmarkdown$", "_cache$"]
footnotereturnlinkcontents: "↩"

permalinks:
  note: "/note/:year/:month/:day/:slug/"
  post: "/post/:year/:month/:day/:slug/"

menu:
  main:
    - name: Home
      url: ""
      weight: 1
    - name: About
      url: "about/"
      weight: 4
    - name: Categories
      url: "categories/"
      weight: 3
    - name: Posts
      url: "post/"
      weight: 2
    #- name: Subscribe
    #  url: "index.xml"

params:
  description: "A website built through Hugo and blogdown."
  footer: "&copy; [Joshua Rowe](#) 2024 -- {Year} | [Github](#) | [BlueSky](#)"

security:
  allowContent: ['.*']

markup:
  highlight:
    codeFences: false
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          block:
          - - \[
            - \]
          - - $$
            - $$
          inline:
          - - \(
            - \)
          - - $
            - $
